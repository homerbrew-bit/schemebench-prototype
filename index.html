:root{--paper:#EFEAE0;--raised:#F7F4EC;--sunken:#E6E0D4;--ink:#2A2824;--ink-soft:#57534A;--ink-faint:#8C867A;--line:#DBD4C6;--line-strong:#C9C1B0;--peri:#6B71BE;--peri-soft:#ECEDF7;--clay:#9E5F4A;--sage:#5C7355;--display:'Fraunces','Hoefler Text',Georgia,'Times New Roman',serif;--body:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--mono:'IBM Plex Mono','SF Mono',Menlo,Consolas,ui-monospace,monospace}
.sb-root *{box-sizing:border-box;margin:0;padding:0}
.sb-root{font-family:var(--body);color:var(--ink);background:var(--paper);min-height:100vh;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}.dim{color:var(--ink-faint)}
.sb-top{display:flex;align-items:center;gap:24px;padding:12px 22px;border-bottom:1px solid var(--line);background:var(--raised);position:sticky;top:0;z-index:30}
.sb-brand{display:flex;align-items:center;gap:10px}.sb-logo{font-family:var(--display);font-size:21px;font-weight:600;letter-spacing:-.02em}
.sb-demo{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--peri);border:1px solid var(--peri);border-radius:3px;padding:2px 6px}
.sb-tabs{display:flex;gap:4px}.sb-tab{font-family:var(--body);font-size:13px;color:var(--ink-soft);background:none;border:none;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:500}
.sb-tab:hover{background:var(--sunken)}.sb-tab.on{color:var(--ink);box-shadow:inset 0 -2px 0 var(--peri);border-radius:6px 6px 0 0}
.sb-topsearch{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 11px;min-width:240px;color:var(--ink-faint)}
.sb-topsearch input{border:none;background:none;outline:none;font-family:var(--body);font-size:13px;color:var(--ink);width:100%}
.sb-clearx{background:none;border:none;color:var(--ink-faint);cursor:pointer;display:flex;padding:2px}.sb-clearx:hover{color:var(--ink)}.sb-clearx.big{padding:4px}
.sb-body{display:flex;align-items:flex-start}.sb-railtoggle{display:none}
.sb-rail{width:284px;flex:0 0 284px;border-right:1px solid var(--line);padding:14px 14px 80px;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto;background:var(--raised)}
.sb-railhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.sb-railhead>span{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}
.sb-reset{font-family:var(--body);font-size:12px;color:var(--peri);background:none;border:none;cursor:pointer}.sb-reset:hover{text-decoration:underline}
.sb-fsection{border-top:1px solid var(--line)}
.sb-fsec-head{width:100%;display:flex;justify-content:space-between;align-items:center;font-family:var(--body);font-size:12.5px;font-weight:600;color:var(--ink);background:none;border:none;padding:11px 2px;cursor:pointer}
.sb-fsec-body{padding-bottom:10px}
.sb-sub{margin-bottom:13px}
.sb-flabel{font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;display:flex;justify-content:space-between;align-items:baseline}
.sb-fhint{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--peri);font-weight:400}
.sb-hint{font-size:10.5px;color:var(--ink-faint);margin-top:6px;font-style:italic}
.sb-chipsel{display:flex;flex-wrap:wrap;gap:5px}
.sb-selchip{font-family:var(--body);font-size:11.5px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:3px 9px;cursor:pointer;transition:.12s}
.sb-selchip:hover{border-color:var(--line-strong)}.sb-selchip.on{color:var(--peri);border-color:var(--peri);background:var(--peri-soft);font-weight:500}
.sb-tri{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.sb-tribtns{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}.sb-tribtns.wide{width:100%}
.sb-tribtn{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);background:var(--paper);border:none;padding:4px 8px;cursor:pointer;flex:1}
.sb-tribtn:not(:last-child){border-right:1px solid var(--line)}.sb-tribtn.on{background:var(--peri);color:#fff}
.sb-dual{position:relative;height:24px;margin-top:4px}.sb-dual-track{position:absolute;top:10px;left:0;right:0;height:3px;background:var(--sunken);border-radius:2px}
.sb-dual-fill{position:absolute;height:3px;background:var(--peri);border-radius:2px}
.sb-dual input{position:absolute;top:0;left:0;width:100%;height:24px;margin:0;background:none;pointer-events:none;-webkit-appearance:none;appearance:none}
.sb-dual input::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:15px;height:15px;border-radius:50%;background:var(--raised);border:2px solid var(--peri);cursor:pointer}
.sb-dual input::-moz-range-thumb{pointer-events:auto;width:13px;height:13px;border-radius:50%;background:var(--raised);border:2px solid var(--peri);cursor:pointer}
.sb-firmsel{display:flex;flex-direction:column;gap:6px}
.sb-firmsearch{font-family:var(--body);font-size:12px;border:1px solid var(--line);border-radius:5px;padding:5px 8px;background:var(--paper);outline:none}
.sb-firmlist{max-height:128px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.sb-firmchip{display:flex;align-items:center;gap:5px;font-family:var(--body);font-size:11.5px;color:var(--ink-soft);background:none;border:none;text-align:left;padding:3px 5px;border-radius:4px;cursor:pointer}
.sb-firmchip:hover{background:var(--sunken)}.sb-firmchip.on{color:var(--peri);font-weight:500;background:var(--peri-soft)}
.sb-main{flex:1;padding:18px 24px 90px;min-width:0}
.sb-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
